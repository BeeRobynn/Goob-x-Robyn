- type: job
  id: Captain
  name: job-name-captain
  description: job-description-captain
  playTimeTracker: JobCaptain
  requirements:
    - !type:DepartmentTimeRequirement
      department: Engineering
      time: 4h
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 4h
    - !type:DepartmentTimeRequirement
      department: Science
      time: 4h
    - !type:DepartmentTimeRequirement
      department: Security
      time: 6h # Goobstation
    - !type:DepartmentTimeRequirement
      department: Command
      time: 8h # Goobstation
    - !type:SpeciesRequirement # Goob - None Felinid
      inverted: true
      species:
      - Felinid
      #any MRP using our code might eventually want to use it
    # - !type:SaturationRequirement # MisandryBox - no neon hair on captain
    #   hairColorSaturation: 0.30
  guides: # goobstation
  - Command
  - Succession
  - StandardProceduresSOP
  - CaptainSOP
  goobcoins: 50 #Goob content
  weight: 20
  startingGear: CaptainGear
  icon: "JobIconCaptain"
  joinNotifyCrew: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      - type: Condemned # Goobstation - Nanotrasen owns your soul pal.
        soulOwnedNotDevil: true

- type: startingGear
  id: CaptainGear
  equipment:
    shoes: ClothingShoesBootsLaceup
    eyes: ClothingEyesGlassesCommand
    #gloves: ClothingHandsGlovesCaptain - Goobstation, moved to loadouts
    id: CaptainPDA
    ears: ClothingHeadsetAltCommand
  storage:
    back:
    - Flash
    - TelescopicBaton # Goobstation
    # - StationCharter

- type: chameleonOutfit
  id: CaptainChameleonOutfit
  job: Captain
  hasMindShield: true
  equipment:
    head: ClothingHeadHatCapcap
    eyes: ClothingEyesGlassesCommand
    mask: ClothingMaskGasCaptain
    neck: ClothingNeckCloakCap
